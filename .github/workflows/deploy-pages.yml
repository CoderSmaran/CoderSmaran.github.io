name: Deploy Portfolio

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - package.json
      - package-lock.json
      - vite.config.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Sync build output to Pages root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -R dist/assets assets

      - name: Commit updated build artifacts
        run: |
          if git diff --quiet; then
            echo "No build artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets
          git commit -m "Update Pages build artifacts"
          git push